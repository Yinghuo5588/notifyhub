<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 - NotifyHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md glass-panel rounded-[28px] p-6 sm:p-8">
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-slate-50">NotifyHub</h1>
            <p class="text-slate-400 mt-2">Webhook 通知中继系统</p>
            <p class="text-slate-500 text-sm mt-1">登录后进入你的消息指挥台</p>
        </div>

        {% if error %}
        <div class="mb-4 rounded-2xl border border-rose-400/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-200">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="请输入用户名">
            </div>
            <div>
                <label>密码</label>
                <input type="password" name="password" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary w-full">登 录</button>
        </form>
    </div>
</body>
</html>
